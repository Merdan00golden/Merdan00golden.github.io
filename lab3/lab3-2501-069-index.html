<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>春韵书城</title>
    <link rel="stylesheet" href="css/lab3-2501-069-index.css">
</head>
<body>

    <div class="header">
        <div class="logo">春韵书城</div>
        <div class="menu">
            <a href=" ">首页</a >
            <a href="#">图书分类</a >
            <a href="#">热门推荐</a >
            <a href="#">新书上市</a >
            <a href="javascript:void(0)" onclick="showBox()">登录/注册</a >
        </div>
    </div>

    <div class="main">
        <div class="left">
            <h3>图书分类导航</h3>
            <ul>
                <li>文学类</li>
                <li>历史类</li>
                <li>计算机类</li>
                <li>教育类</li>
                <li>儿童类</li>
            </ul>
        </div>

        <div class="center">
            <h3>图书展示区</h3>

            <div class="book first">
                <img src="img/book1.jpg" alt="">
                <div class="hide">查看详情</div>
                <p>活着</p >
            </div>

            <div class="book">
                <img src="img/book2.jpg" alt="">
                <p>三体</p >
            </div>

            <div class="book">
                <img src="img/book3.jpg" alt="">
                <p>平凡的世界</p >
            </div>

            <div class="clear"></div>

            <h3>热门推荐</h3>
            <div class="hot">算法导论</div>
            <div class="hot">红楼梦</div>
            <div class="hot">百年孤独</div>

            <div class="clear"></div>

            <h3>新书上市</h3>
            <table>
                <tr>
                    <th>书名</th>
                    <th>作者</th>
                    <th>价格</th>
                </tr>
                <tr>
                    <td>长安的荔枝</td>
                    <td>马伯庸</td>
                    <td>45元</td>
                </tr>
                <tr>
                    <td>云边有个小卖部</td>
                    <td>张嘉佳</td>
                    <td>36元</td>
                </tr>
            </table>
        </div>

        <div class="right">
            <h3>促销信息</h3>
            <p>图书8折</p >
            <p>满100减20</p >
        </div>
    </div>

    <div id="bg" class="bg" onclick="hideBox()"></div>

    <div id="loginBox" class="login-box">
        <div class="box-inner">
            <span class="close" onclick="hideBox()">×</span>
            <h2>用户登录 / 注册</h2>

            <input type="text" id="username" placeholder="请输入用户名">
            <input type="password" id="password" placeholder="请输入密码">

            <button onclick="loginUser()">登录</button>
            <button onclick="registerUser()">注册</button>

            <p class="tip">先注册，再登录</p >
        </div>
    </div>

    <script>
        function showBox() {
            document.getElementById("bg").style.display = "block";
            document.getElementById("loginBox").style.display = "block";
        }

        function hideBox() {
            document.getElementById("bg").style.display = "none";
            document.getElementById("loginBox").style.display = "none";
        }

        function registerUser() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            if (username === "" || password === "") {
                alert("用户名和密码不能为空");
                return;
            }

            localStorage.setItem("myUser", username);
            localStorage.setItem("myPass", password);
            alert("注册成功，请再登录");
        }

        function loginUser() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            var saveUser = localStorage.getItem("myUser");
            var savePass = localStorage.getItem("myPass");

            if (username === saveUser && password === savePass) {
                alert("登录成功");
                hideBox();
            } else {
                alert("用户名或密码错误");
            }
        }
    </script>

</body>
</html>
